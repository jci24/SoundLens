name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore backend/SoundLens.slnx

      - name: Build
        run: dotnet build backend/SoundLens.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test backend/SoundLens.slnx --configuration Release --no-build

  frontend:
    name: Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Test Copilot eval graders
        run: node --test scripts/copilot-evals/*.test.mjs

      - name: Install
        run: npm ci
        working-directory: frontend

      - name: Lint
        run: npm run lint
        working-directory: frontend

      - name: Test
        run: npm run test:run
        working-directory: frontend

      - name: Build
        run: npm run build
        working-directory: frontend
